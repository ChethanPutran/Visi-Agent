<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Visi-Agent | Video Intelligence</title>
    <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
<div class="container">
    <header>
        <h1>Visi-Agent</h1>
        <p class="subtitle">Multimodal Video Intelligence Dashboard</p>
    </header>

    <!-- Main Layout -->
    <div class="main-grid">

        <!-- Left Column -->
        <div class="left-column">

            <!-- Upload Section -->
            <div id="uploadSection" class="card">
                <h2>Upload Video</h2>
                <input type="file" id="videoFile" accept="video/*" />
                <button class="btn-primary" onclick="uploadVideo()">Upload</button>
            </div>

            <!-- Video Info -->
            <div id="videoInfo" class="card hidden">
                <h2>Video Uploaded</h2>
                <p><strong>Video ID:</strong> <span id="videoId"></span></p>
            </div>

            <!-- Actions -->
            <div id="actionSection" class="card hidden">
                <button id="processBtn" class="btn-primary" onclick="processVideo()">▶ Process Video</button>
                <button id="transcriptBtn" class="btn-secondary" onclick="fetchTranscript()" disabled>📝 Transcript</button>
                <button id="summaryBtn" class="btn-secondary" onclick="fetchSummary()" disabled>📌 Summary</button>
            </div>

            <!-- Status -->
            <div id="statusSection" class="card hidden">
                <h2>Processing Status</h2>
                <div id="statusList" class="status-list"></div>
            </div>

        </div>

      <!-- Right Column -->
<div class="right-column">

    <!-- Transcript Output -->
    <div id="transcriptSection" class="card hidden">
        <h2>📝 Transcript</h2>
        <pre id="transcriptOutput"></pre>
    </div>

    <!-- Summary Output -->
    <div id="summarySection" class="card hidden">
        <h2>📌 Summary</h2>
        <pre id="summaryOutput"></pre>
    </div>

</div>


    </div>
</div>

<script src="/static/js/video.js"></script>
</body>
</html>
