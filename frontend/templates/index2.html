<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Visi-Agent | Video Management</title>
    <link rel="stylesheet" href="/static/css/style2.css">
</head>
<body>
<div class="container">

    <h1>🎥 Visi-Agent</h1>
    <p class="subtitle">Multimodal Video Intelligence Dashboard</p>

    <div class="main-row">

        <!-- Left Column -->
        <div class="left-column">

            <!-- Upload Section
            <div class="card" id="uploadSection">
                <h2>📤 Upload Videos</h2>
                <input type="file" id="videoFile" accept="video/*" multiple />
                <button onclick="uploadVideo()">Upload Selected Videos</button>
            </div> -->

                <!-- Upload Section -->
            <div class="card" id="uploadSection">
                <h2>📤 Upload Videos</h2>
                <input type="file" id="videoFile" accept="video/*" multiple />
                <div class="upload-buttons">
                    <button onclick="uploadVideo()">Upload Selected Video(s)</button>
                    <button onclick="uploadBatchVideos()">Upload All (Batch)</button>
                </div>
            </div>


            <!-- Video List Section -->
            <div class="card" id="videoListSection">
                <h2>📁 Videos</h2>
                <ul id="videoList"></ul>
            </div>

        </div>

        <!-- Right Column -->
        <div class="right-column">

            <!-- Status Section -->
            <div class="card hidden" id="statusSection">
                <h2>⏳ Processing Status</h2>
                <ul id="statusList"></ul>
            </div>

            <!-- Transcript Section -->
            <div class="card hidden" id="transcriptSection">
                <h2>📝 Transcript</h2>
                <pre id="transcriptOutput"></pre>
            </div>

            <!-- Summary Section -->
            <div class="card hidden" id="summarySection">
                <h2>📌 Summary</h2>
                <pre id="summaryOutput"></pre>
            </div>

        </div>

    </div>
</div>

<script src="/static/js/video2.js"></script>
</body>
</html>
